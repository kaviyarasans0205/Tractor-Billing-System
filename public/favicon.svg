<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#2f7a4b" rx="40"/>
  
  <!-- Tractor simplified icon -->
  <!-- Back wheel -->
  <circle cx="60" cy="140" r="35" fill="#333"/>
  <circle cx="60" cy="140" r="28" fill="#555"/>
  
  <!-- Front wheel -->
  <circle cx="140" cy="140" r="25" fill="#333"/>
  <circle cx="140" cy="140" r="18" fill="#555"/>
  
  <!-- Tractor body -->
  <rect x="50" y="80" width="100" height="50" fill="#2f7a4b" rx="5"/>
  <rect x="55" y="70" width="90" height="20" fill="#1a4d2e" rx="3"/>
  
  <!-- Cabin/Seat -->
  <rect x="120" y="60" width="25" height="25" fill="#1a4d2e" rx="2"/>
  
  <!-- Exhaust pipe -->
  <rect x="100" y="50" width="8" height="25" fill="#555"/>
  
  <!-- Text -->
  <text x="100" y="175" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">KPS</text>
</svg>